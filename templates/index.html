<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>iPixel Control</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <main class="panel">
    <h1>iPixel Control</h1>

    <img id="preview" src="/preview.png" alt="Current frame">

    <div class="status">
      <span id="status-dot" class="dot"></span>
      <span id="status-text">connecting...</span>
    </div>

    <div class="modes">
      {% for mode in modes %}
        <button class="mode-btn" data-mode="{{ mode.key }}">{{ mode.label }}</button>
      {% endfor %}
    </div>

    <label class="brightness">
      Brightness
      <input type="range" id="brightness" min="0" max="100" value="60">
    </label>

    <label class="team-field">
      Cricket teams (comma-separated)
      <div class="team-row">
        <input type="text" id="cricket-team" placeholder="IND, ENG, AUS">
        <button id="team-save">Set</button>
      </div>
    </label>

    <label class="team-field">
      Cricket match
      <select id="cricket-match">
        <option value="">Auto (cycle all live matches)</option>
      </select>
    </label>

    <label class="team-field">
      Cricket view
      <select id="cricket-view">
        <option value="">Auto (cycle score/batting/bowling)</option>
        <option value="main">Score only</option>
        <option value="batting">Batting only</option>
        <option value="bowling">Bowling only</option>
      </select>
    </label>

    <h2>Device</h2>
    <label class="team-field">
      BLE address
      <div class="team-row">
        <input type="text" id="ble-address" placeholder="AA:BB:CC:DD:EE:FF">
        <button id="ble-connect">Connect</button>
      </div>
    </label>
    <div class="ble-actions">
      <button id="ble-disconnect" class="secondary-btn">Disconnect</button>
      <button id="ble-scan" class="secondary-btn">Scan for devices</button>
    </div>
    <div id="ble-scan-status" class="ble-scan-status"></div>
    <div id="ble-results" class="ble-results"></div>

    <h2>Weather location</h2>
    <div class="latlon-row">
      <input type="number" id="weather-lat" step="0.0001" placeholder="Latitude">
      <input type="number" id="weather-lon" step="0.0001" placeholder="Longitude">
      <button id="weather-save">Set</button>
    </div>

    <h2>Log</h2>
    <pre id="log" class="log"></pre>

    <button id="shutdown-btn" class="danger-btn">Shut down</button>
  </main>

  <script>
    async function refreshStatus() {
      const res = await fetch('/api/status');
      const data = await res.json();

      document.getElementById('status-text').textContent =
        (data.paused ? 'disconnected (manual)' : (data.connected ? 'connected' : 'disconnected')) + ' · ' + data.mode;
      document.getElementById('status-dot').classList.toggle('connected', data.connected);

      document.querySelectorAll('.mode-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.mode === data.mode);
      });

      document.getElementById('brightness').value = data.brightness;
    }

    document.querySelectorAll('.mode-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        await fetch('/api/mode', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ mode: btn.dataset.mode }),
        });
        refreshStatus();
      });
    });

    document.getElementById('brightness').addEventListener('change', async (e) => {
      await fetch('/api/brightness', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ value: e.target.value }),
      });
    });

    async function refreshLogs() {
      const res = await fetch('/api/logs');
      const lines = await res.json();
      const el = document.getElementById('log');
      const wasAtBottom = el.scrollTop + el.clientHeight >= el.scrollHeight - 4;

      el.textContent = lines
        .map(l => `${l.time} [${l.level}] ${l.message}`)
        .join('\n');

      if (wasAtBottom) el.scrollTop = el.scrollHeight;
    }

    async function loadCricketTeam() {
      const res = await fetch('/api/cricket/teams');
      const data = await res.json();
      document.getElementById('cricket-team').value = data.teams.join(', ');
    }

    document.getElementById('team-save').addEventListener('click', async () => {
      const teams = document.getElementById('cricket-team').value;
      const res = await fetch('/api/cricket/teams', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ teams }),
      });
      const data = await res.json();
      if (data.ok) document.getElementById('cricket-team').value = data.teams.join(', ');
    });

    async function refreshCricketMatches() {
      const res = await fetch('/api/cricket/matches');
      const data = await res.json();

      const select = document.getElementById('cricket-match');
      const wasFocused = document.activeElement === select;
      if (!wasFocused) {
        select.innerHTML = '<option value="">Auto (cycle all live matches)</option>';
        data.matches.forEach(m => {
          const opt = document.createElement('option');
          opt.value = m.match_id;
          opt.textContent = `${m.label} — ${m.score}`;
          select.appendChild(opt);
        });
        select.value = data.forced_match_id || '';
      }

      const viewSelect = document.getElementById('cricket-view');
      if (document.activeElement !== viewSelect) {
        viewSelect.value = data.forced_view || '';
      }
    }

    async function selectCricket(partial) {
      const res = await fetch('/api/cricket/select', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(partial),
      });
      return res.json();
    }

    document.getElementById('cricket-match').addEventListener('change', (e) => {
      selectCricket({ match_id: e.target.value });
    });

    document.getElementById('cricket-view').addEventListener('change', (e) => {
      selectCricket({ view: e.target.value });
    });

    async function loadBleAddress() {
      const res = await fetch('/api/status');
      const data = await res.json();
      const input = document.getElementById('ble-address');
      if (document.activeElement !== input) input.value = data.address || '';
    }

    document.getElementById('ble-connect').addEventListener('click', async () => {
      const address = document.getElementById('ble-address').value;
      await fetch('/api/ble/connect', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ address }),
      });
      refreshStatus();
    });

    document.getElementById('ble-disconnect').addEventListener('click', async () => {
      await fetch('/api/ble/disconnect', { method: 'POST' });
      refreshStatus();
    });

    document.getElementById('ble-scan').addEventListener('click', async () => {
      const statusEl = document.getElementById('ble-scan-status');
      const resultsEl = document.getElementById('ble-results');
      const btn = document.getElementById('ble-scan');

      btn.disabled = true;
      statusEl.textContent = 'Scanning... (~8s)';
      resultsEl.innerHTML = '';

      try {
        const res = await fetch('/api/ble/scan', { method: 'POST' });
        const data = await res.json();

        if (!data.ok) {
          statusEl.textContent = 'Scan failed: ' + data.error;
          return;
        }

        statusEl.textContent = `Found ${data.devices.length} device(s):`;
        data.devices.forEach(d => {
          const item = document.createElement('button');
          item.className = 'ble-result-item';
          item.textContent = `${d.name} — ${d.address}`;
          item.addEventListener('click', () => {
            document.getElementById('ble-address').value = d.address;
          });
          resultsEl.appendChild(item);
        });
      } catch (err) {
        statusEl.textContent = 'Scan failed: ' + err;
      } finally {
        btn.disabled = false;
      }
    });

    async function loadWeatherLocation() {
      const res = await fetch('/api/weather/location');
      const data = await res.json();
      const latInput = document.getElementById('weather-lat');
      const lonInput = document.getElementById('weather-lon');
      if (document.activeElement !== latInput) latInput.value = data.lat;
      if (document.activeElement !== lonInput) lonInput.value = data.lon;
    }

    document.getElementById('weather-save').addEventListener('click', async () => {
      const lat = document.getElementById('weather-lat').value;
      const lon = document.getElementById('weather-lon').value;
      const res = await fetch('/api/weather/location', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ lat, lon }),
      });
      const data = await res.json();
      if (!data.ok) alert(data.error);
    });

    document.getElementById('shutdown-btn').addEventListener('click', async () => {
      if (!confirm('This will stop the app and disconnect the display. Continue?')) return;
      await fetch('/api/shutdown', { method: 'POST' });
      document.body.innerHTML = '<main class="panel"><h1>Shut down</h1><p>The app has stopped. Restart it from the terminal to use it again.</p></main>';
    });

    setInterval(refreshStatus, 3000);
    setInterval(refreshCricketMatches, 5000);
    refreshCricketMatches();
    setInterval(refreshLogs, 2000);
    refreshLogs();
    loadCricketTeam();
    loadBleAddress();
    loadWeatherLocation();
    setInterval(() => {
      document.getElementById('preview').src = '/preview.png?t=' + Date.now();
    }, 5000);
    refreshStatus();
  </script>
</body>
</html>
